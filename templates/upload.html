<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File - CodeInsight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
                <i class="fas fa-code"></i> CodeInsight
            </a>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('about') }}">Learn</a>
            </li>
            <div class="ms-auto">
                <a class="btn btn-light btn-sm" href="{{ url_for('logout') }}">Logout</a>
                
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h1 class="h3 fw-bold mb-2">Upload Python File</h1>
                        <p class="text-muted mb-4">Select a .py file to analyze</p>
                        
                        <form id="uploadForm">
                            <div class="mb-4">
                                <div id="dropZone" class="border border-2 border-dashed border-primary rounded-3 p-5 text-center" 
                                     style="cursor: pointer; transition: all 0.3s;">
                                    <i class="fas fa-cloud-upload-alt text-primary" style="font-size: 3rem;"></i>
                                    <p class="mt-3 mb-0">
                                        <strong>Click to upload</strong> or drag and drop
                                    </p>
                                    <p class="text-muted mt-2 mb-0">
                                        Python files (.py) only
                                    </p>
                                </div>
                                <input type="file" id="fileInput" name="file" accept=".py" class="form-control d-none">
                            </div>
                            
                            <div id="fileInfo" class="alert alert-info d-none" role="alert">
                                <strong id="fileName"></strong>
                            </div>
                            
                            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
                            <div id="successAlert" class="alert alert-success d-none" role="alert"></div>
                            
                            <div id="loadingSpinner" class="d-none">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <span class="ms-2">Uploading...</span>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold d-none" id="submitBtn">
                                <i class="fas fa-upload"></i> Upload File
                            </button>
                        </form>
                        
                        <hr class="my-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary w-100">
                            Back to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const uploadForm = document.getElementById('uploadForm');

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = '#e7f3ff';
            dropZone.style.borderColor = '#0d6efd';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.backgroundColor = 'white';
            dropZone.style.borderColor = '#0d6efd';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = 'white';
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });

        // File input change
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const file = fileInput.files[0];
            
            if (!file) {
                fileInfo.classList.add('d-none');
                submitBtn.classList.add('d-none');
                return;
            }

            // Validate file type
            if (!file.name.endsWith('.py')) {
                errorAlert.textContent = 'Only .py files are allowed';
                errorAlert.classList.remove('d-none');
                successAlert.classList.add('d-none');
                fileInput.value = '';
                fileInfo.classList.add('d-none');
                submitBtn.classList.add('d-none');
                return;
            }

            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
            fileName.textContent = file.name;
            fileInfo.classList.remove('d-none');
            submitBtn.classList.remove('d-none');
        }

        // Form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) {
                errorAlert.textContent = 'Please select a file';
                errorAlert.classList.remove('d-none');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            loadingSpinner.classList.remove('d-none');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    successAlert.textContent = 'File uploaded successfully! Redirecting...';
                    successAlert.classList.remove('d-none');
                    errorAlert.classList.add('d-none');
                    
                    setTimeout(() => {
                        window.location.href = `/analyze/${data.file_id}`;
                    }, 1500);
                } else {
                    errorAlert.textContent = data.error;
                    errorAlert.classList.remove('d-none');
                    loadingSpinner.classList.add('d-none');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                errorAlert.textContent = 'An error occurred. Please try again.';
                errorAlert.classList.remove('d-none');
                loadingSpinner.classList.add('d-none');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
